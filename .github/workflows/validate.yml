name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "Integration"
          # wildfire_monitor isn't in the home-assistant/brands repo yet; drop this
          # ignore once it's accepted there (matching the sibling integrations).
          ignore: "brands"
